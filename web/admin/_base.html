<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Admin · Sofía{% endblock %}</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f4ee;
      color: #2a2a2a;
      font-size: 14px;
      line-height: 1.5;
    }
    header {
      background: #c93d2e;
      color: white;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { margin: 0; font-size: 16px; font-weight: 600; }
    header a { color: white; text-decoration: none; opacity: 0.85; }
    header a:hover { opacity: 1; }
    main { padding: 20px; max-width: 1280px; margin: 0 auto; }
    h2 { margin: 28px 0 10px; font-size: 15px; text-transform: uppercase; letter-spacing: 0.6px; color: #7a7466; }
    table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
    th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #ece8de; font-size: 13px; }
    th { background: #faf9f3; font-weight: 600; color: #6a6353; }
    tr:hover td { background: #faf9f3; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
    .card { background: white; padding: 14px 16px; border-radius: 6px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
    .card .label { font-size: 11px; text-transform: uppercase; color: #8a8472; letter-spacing: 0.4px; }
    .card .value { font-size: 22px; font-weight: 600; margin-top: 4px; color: #1a1a1a; }
    .card .value.small { font-size: 16px; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
    .pill-whatsapp { background: #e3f5dd; color: #2e7d32; }
    .pill-telegram { background: #d8ebfa; color: #1976d2; }
    .pill-web { background: #f0e4f8; color: #6a3eaa; }
    .pill-fase { background: #fef3d9; color: #8a5a00; }
    .pill-modo-aprendizaje { background: #fde4e4; color: #b94343; }
    .pill-agendado { background: #c93d2e; color: white; }
    a { color: #c93d2e; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .msg { padding: 10px 14px; margin: 6px 0; border-radius: 8px; max-width: 70%; white-space: pre-wrap; }
    .msg.user { background: white; border: 1px solid #e7e2d8; }
    .msg.assistant { background: #c93d2e; color: white; margin-left: auto; }
    .meta-line { font-size: 11px; color: #8a8472; margin: 2px 0 12px; }
    .meta-line code { background: #faf9f3; padding: 1px 5px; border-radius: 3px; }
    .turn-trace { background: #faf9f3; border: 1px dashed #d8d3c8; padding: 8px 12px; font-family: monospace; font-size: 12px; margin: 4px 0 12px; border-radius: 4px; }
    .turn-trace .key { color: #7a7466; }
    .turn-trace .fail { color: #b94343; }
    .top-expensive { font-family: monospace; font-size: 12px; }
    nav.crumb { font-size: 12px; color: #8a8472; margin-bottom: 16px; }
  </style>
</head>
<body>
  <header>
    <span style="font-size: 20px;">🍁</span>
    <h1>Sofía Admin</h1>
    <a href="/admin/?k={{ admin_key }}">Inicio</a>
    <span style="opacity: 0.4;">·</span>
    <a href="/chat" target="_blank">Chat Web</a>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
